ak_motor_node:
  ros__parameters:
    can_interface: "can0"
    motor_id: 1
    motor_name: "ak40_10"
    poll_rate_hz: 100.0
    # AK40-10 MIT-mode physical limits
    p_min: -12.5   # rad
    p_max:  12.5   # rad
    v_min: -45.5   # rad/s  (AK40-10 spec)
    v_max:  45.5   # rad/s
    t_min:  -5.0   # Nm     (AK40-10 spec)
    t_max:   5.0   # Nm
    kp_max: 500.0  # Nm/rad
    kd_max:   5.0  # Nms/rad
    # Control gains (set before enabling)
    kp: 1.0
    kd: 0.3
    # Safety: switch to pure damping if no command received within this window
    command_timeout_ms: 500.0
    kd_watchdog: 0.05  # Nms/rad damping applied on timeout
    temp_limit_c: 75.0 # auto-disable threshold in actual Celsius (raw byte - 40)
